<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Art Ammo</title>

  <link rel="stylesheet" href="./styles/base.css">
  <link rel="stylesheet" href="./styles/layout.css">
  <link rel="stylesheet" href="./styles/app.css">

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfmake@0.2.10/build/pdfmake.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfmake@0.2.10/build/vfs_fonts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <script>
    window.ART_AMMO_APP_META = {
      appName: "Art Ammo",
      version: "0.28",
      buildLabel: "v28-alias-dictionary",
      buildDate: "2026-05-07",
      logicProfile: "Excel локально + аналітика залишків + журнал дій"
    };
  </script>
</head>

<body>
  <main class="app-container">
    <section class="upload-card">
      <div class="hero-row">
        <div>
          <h1>ART AMMO</h1>
          <p class="subtitle">Система аналізу комплектів</p>
        </div>
        <div class="hero-meta">
          <div class="status-pill" id="appStatus">Очікує Excel</div>
          <div class="version-pill" id="appVersion">v0.28</div>
        </div>
      </div>

      <div class="actions-row">
        <label class="upload-button">
          Завантажити Excel
          <input type="file" id="excelFile" accept=".xlsx,.xls" hidden>
        </label>

        <button id="analyzeBtn" class="analyze-button" disabled>
          Аналізувати файл
        </button>

        <button id="exportExcelBtn" class="analyze-button" disabled>
          Експорт Excel
        </button>

        <button id="exportPdfBtn" class="analyze-button" disabled>
          PDF-звіт
        </button>

        <button id="exportDecisionPackageBtn" class="analyze-button" disabled>
          Пакет рішення
        </button>

        <label class="analyze-button import-decision-label">
          Імпорт пакета
          <input type="file" id="importDecisionPackageFile" accept=".json,.zip,application/json,application/zip" hidden>
        </label>
      </div>

      <div id="fileInfo"></div>

      <div class="filters-panel" id="filtersPanel" hidden>
        <select id="unitFilter" class="filter-control">
          <option value="all">Всі підрозділи</option>
        </select>

        <label class="filter-check">
          <input type="checkbox" id="longRangeOnly">
          Тільки далекобійні
        </label>

        <input
          type="text"
          id="searchFilter"
          class="filter-control search-control"
          placeholder="Пошук: снаряд, заряд, підрозділ..."
        >

        <label class="threshold-control">
          Малий залишок ≤
          <input
            type="number"
            id="lowBalanceThreshold"
            min="1"
            max="9999"
            step="1"
            value="10"
          >
        </label>

        <select id="stockFilter" class="filter-control">
          <option value="all">Всі залишки</option>
          <option value="problem">Тільки вузькі місця</option>
          <option value="zero">Тільки нульові</option>
          <option value="low">Тільки малий залишок</option>
        </select>

        <select id="sortFilter" class="filter-control">
          <option value="default">Сортування: як у файлі</option>
          <option value="balanceAsc">Залишок ↑</option>
          <option value="balanceDesc">Залишок ↓</option>
          <option value="rangeDesc">Дальність ↓</option>
          <option value="rangeAsc">Дальність ↑</option>
          <option value="unitAsc">Підрозділ А-Я</option>
          <option value="projectileAsc">Снаряд А-Я</option>
        </select>

        <select id="actionPriorityFilter" class="filter-control">
          <option value="all">Журнал дій: всі пріоритети</option>
          <option value="I">Пріоритет I</option>
          <option value="II">Пріоритет II</option>
          <option value="III">Пріоритет III</option>
        </select>

        <label class="filter-check action-check">
          <input type="checkbox" id="actionLongOnly">
          Дії: тільки далекобійні
        </label>

        <select id="actionStatusFilter" class="filter-control">
          <option value="all">Статус дій: всі</option>
          <option value="planned">Заплановано</option>
          <option value="done">Виконано</option>
          <option value="rejected">Відхилено</option>
        </select>

        <button id="exportStatusesBtn" class="analyze-button small-button" disabled>
          Експорт статусів
        </button>

        <label class="analyze-button small-button import-status-label">
          Імпорт статусів
          <input type="file" id="importStatusesFile" accept=".json" hidden>
        </label>

        <button id="exportAliasDictionaryBtn" class="analyze-button small-button" disabled>
          Експорт словника
        </button>

        <label class="analyze-button small-button import-status-label">
          Імпорт словника
          <input type="file" id="importAliasDictionaryFile" accept=".json" hidden>
        </label>

        <button id="resetAliasDictionaryBtn" class="analyze-button small-button" disabled>
          Очистити словник
        </button>

        <button id="resetFiltersBtn" class="analyze-button small-button">
          Скинути фільтри
        </button>
      </div>

      <div id="filterStatus" class="filter-status" hidden></div>
      <div id="sheetList"></div>
      <div id="analysisPanel"></div>
    </section>
  </main>

  <script src="./scripts/schema.js"></script>
  <script src="./scripts/normalizer.js"></script>
  <script src="./scripts/excel.js"></script>
  <script src="./scripts/calculator.js"></script>
  <script src="./scripts/export.js"></script>
  <script src="./scripts/export-pdf.js"></script>
</body>
</html>
